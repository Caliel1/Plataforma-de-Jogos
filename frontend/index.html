<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Play Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo" style="cursor: pointer;" onclick="window.location.href='index.html'">Cloud Play Store</div>
        <nav>
            <ul>
                <li><a href="#">Loja</a></li>
                <li><a href="#">Promoções</a></li>
                <li><a href="#">Novidades</a></li>
                <li><a href="#">Suporte</a></li>
            </ul>
        </nav>
        <button class="btn-login" onclick="window.location.href='login.html'">Entrar</button>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1>Os melhores jogos,<br>em um só lugar.</h1>
            <p>Explore lançamentos, promoções, clássicos e novidades em uma plataforma rápida, moderna e fácil de usar.</p>
            <button class="btn-primary" onclick="window.location.href='login.html'">Ver Jogos</button>
        </div>
        <div class="hero-image">
            <div class="placeholder-image">Banner / Imagem do Jogo</div>
        </div>
    </main>

</html>
