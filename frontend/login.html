<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cloud Play Store</title>
    <link rel="stylesheet" href="login.style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo" style="cursor: pointer; margin-bottom: 20px; font-weight: bold; font-size: 1.5rem;" onclick="window.location.href='index.html'">Cloud Play Store</div>
            <h1>Login</h1>
            <p class="subtitle">Bem-vindo à Cloud Play Store</p>

            <form action="#">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu email" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                    <a href="#" class="forgot-password">Esqueci minha senha</a>
                </div>

                <button type="button" class="btn-primary" onclick="window.location.href='perfil.html'">Entrar</button>
            </form>

            <p class="signup-text">Não tem conta? <a href="#">Criar conta</a></p>
        </div>
    </div>
</body>
</html>
