<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Pagamento - Cloud Play Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pagamento.style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo" style="cursor: pointer;" onclick="window.location.href='index.html'">Cloud Play Store</div>
        <nav>
            <ul>
                <li><a href="#">Loja</a></li>
                <li><a href="#">Promoções</a></li>
                <li><a href="#">Novidades</a></li>

        <button class="btn-login" onclick="window.location.href='index.html'">Sair</button>

                <button class="btn-payment" onclick="window.location.href='confirmacao.html'">🅿️ PayPal</button>
