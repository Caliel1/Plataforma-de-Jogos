<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Confirmado - Cloud Play Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="confirmacao.style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo" style="cursor: pointer;" onclick="window.location.href='index.html'">Cloud Play Store</div>
        <nav>
            <ul>
                <li><a href="#">Loja</a></li>
                <li><a href="#">Promoções</a></li>
                <li><a href="#">Novidades</a></li>
                <li><a href="#">Suporte</a></li>
            </ul>
        </nav>
        <button class="btn-login" onclick="window.location.href='index.html'">Sair</button>
    </header>

    <main class="confirmation-container">
        <div class="confirmation-box">
            <div class="icon-circle">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            
            <h2>Pagamento confirmado</h2>
            <p>O pagamento foi concluído com sucesso.</p>
        </div>
    </main>
</body>
</html>
